<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdeleve - Jóias Sustentáveis</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f6f4f1;
    color: #2e2e2e;
}

/* HEADER */
header {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px 10px;
    background: #2f3e34;
    position: relative;
}

.logo {
    width: 400px;
}

/* Ícone admin */
.admin-icon {
    position: absolute;
    right: 20px;
    top: 20px;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    transition: 0.3s;
}

.admin-icon:hover {
    background: rgba(255,255,255,0.3);
}

/* MODAL ADMIN */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    max-width: 450px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
}

.modal-content input, 
.modal-content select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
}

.modal-content button {
    padding: 10px 20px;
    background: #2f3e34;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 5px;
    font-size: 14px;
}

.modal-content button:hover {
    opacity: 0.9;
}

/* INDICADOR ADMIN */
.admin-badge {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #2f3e34;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 100;
    display: none;
    gap: 10px;
    align-items: center;
}

.admin-badge button {
    background: #dc3545;
    border: none;
    color: white;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
}

/* ABAS */
.tabs {
    display: flex;
    gap: 10px;
    padding: 15px 10px;
    overflow-x: auto;
    background: #ffffff;
    flex-wrap: wrap;
    justify-content: center;
}

.tabs::-webkit-scrollbar {
    display: none;
}

.tab-btn {
    flex: 0 0 auto;
    padding: 10px 20px;
    border: none;
    background: #eaeaea;
    cursor: pointer;
    border-radius: 25px;
    font-size: 16px;
    font-weight: bold;
    transition: all 0.3s;
}

.tab-btn:hover {
    background: #cbd8d0;
}

.tab-btn.active {
    background: #2f3e34;
    color: #fff;
}

/* GRID */
.products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

@media (max-width: 600px) {
    .products {
        grid-template-columns: 1fr;
    }
}

/* CARD */
.card {
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    position: relative;
    transition: all 0.3s;
}

.card.vendido-card {
    opacity: 0.7;
    background: #f5f5f5;
}

/* NUMERO */
.card::after {
    content: "Nº " attr(data-numero);
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: #2f3e34;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    padding: 5px 10px;
    border-radius: 20px;
    z-index: 1;
}

/* IMAGEM */
.card img {
    width: 100%;
    height: 35vw;
    max-height: 380px;
    min-height: 180px;
    object-fit: contain;
    padding: 10px;
    cursor: zoom-in;
    transition: transform 0.3s ease;
    background: #fff;
}

.card:hover img {
    transform: scale(1.02);
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-size: 13px;
    opacity: 0;
    transition: 0.3s;
    pointer-events: none;
}

.card:hover .overlay {
    opacity: 1;
}

/* INFO */
.info {
    padding: 12px;
    text-align: center;
}

.price {
    font-weight: bold;
    color: #3e5c4d;
    font-size: 18px;
    margin: 5px 0;
}

.product-name {
    font-weight: 500;
    margin: 5px 0;
}

/* BOTÃO WHATSAPP */
.btn-whats {
    display: inline-block;
    padding: 10px 20px;
    background: #25d366;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s;
    margin-top: 8px;
}

.btn-whats:hover {
    background: #1da15a;
    transform: scale(1.02);
}

/* BOTÕES ADMIN */
.admin-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
}

.btn-admin {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn-vender {
    background: #dc3545;
    color: white;
}

.btn-vender:hover {
    background: #c82333;
}

.btn-restaurar {
    background: #ffc107;
    color: #333;
}

.btn-restaurar:hover {
    background: #e0a800;
}

/* STATUS */
.status {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 8px;
}

.disponivel { background: #d4edda; color: #155724; }
.reservado { background: #fff3cd; color: #856404; }
.vendido { background: #6c757d; color: white; }

/* ZOOM */
#zoom {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#zoom img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    background: white;
}

/* RODAPÉ */
footer {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: #666;
    background: #fff;
    margin-top: 20px;
}

/* FORMULÁRIO NO MODAL */
.form-group {
    text-align: left;
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    font-size: 14px;
    color: #333;
}

.form-group small {
    display: block;
    color: #666;
    font-size: 11px;
    margin-top: 3px;
}

.btn-primary {
    background: #2f3e34 !important;
    width: 100%;
    margin-top: 10px;
    font-weight: bold;
}

.btn-primary:hover {
    background: #1e2c24 !important;
}

hr {
    margin: 20px 0;
    border: none;
    border-top: 1px solid #ddd;
}

h3, h4 {
    margin-bottom: 15px;
    color: #2f3e34;
}

.resumo-box {
    background: #f0f2f0;
    padding: 12px;
    border-radius: 8px;
    text-align: left;
    font-size: 14px;
    line-height: 1.8;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo" alt="Verdeleve Logo" onerror="this.src='https://placehold.co/400x100?text=Verdeleve'">
    <button class="admin-icon" id="adminIcon" title="Área administrativa">🔒</button>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="filtrar('disponiveis', event)">✨ Disponíveis</button>
    <button class="tab-btn" onclick="filtrar('pecas_vendidas', event)">💔 Peças já vendidas</button>
    <button class="tab-btn" onclick="filtrar('brinco', event)">Brincos</button>
    <button class="tab-btn" onclick="filtrar('colar', event)">Colares</button>
    <button class="tab-btn" onclick="filtrar('bracelete', event)">Braceletes</button>
</div>

<section class="products" id="products-container"></section>

<footer>
    📲 WhatsApp: (11) 96342-9803
</footer>

<div id="zoom" onclick="fecharZoom()">
    <img id="img-zoom">
</div>

<!-- Modal de admin -->
<div id="adminModal" class="modal">
    <div class="modal-content">
        <div id="loginSection">
            <h3>🔒 Área Administrativa</h3>
            <p>Digite a senha para gerenciar o site:</p>
            <input type="password" id="adminPassword" placeholder="Senha" autocomplete="off">
            <div>
                <button onclick="loginAdmin()">Entrar</button>
                <button onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
        
        <div id="adminPanel" style="display:none;">
            <h3>👑 Painel do Administrador</h3>
            
            <h4>➕ Adicionar nova peça</h4>
            <div class="form-group">
                <label>Nome da peça:</label>
                <input type="text" id="novaPecaNome" placeholder="Ex: Brinco de Madeira Folhas">
            </div>
            
            <div class="form-group">
                <label>Categoria:</label>
                <select id="novaPecaCategoria">
                    <option value="colar">Colar</option>
                    <option value="brinco">Brinco</option>
                    <option value="bracelete">Bracelete</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Preço (R$):</label>
                <input type="number" id="novaPecaPreco" placeholder="Ex: 45" step="1">
            </div>
            
            <div class="form-group">
                <label>Nome do arquivo da imagem:</label>
                <input type="text" id="novaPecaImg" placeholder="Ex: joia18.jpg">
                <small>⚠️ ATENÇÃO: Coloque a imagem na mesma pasta do site primeiro!</small>
            </div>
            
            <button class="btn-primary" onclick="adicionarNovaPeca()">➕ Adicionar peça</button>
            
            <hr>
            
            <h4>📊 Resumo do acervo</h4>
            <div class="resumo-box" id="resumoInfo">
                Carregando...
            </div>
            
            <hr>
            
            <button onclick="logoutAdmin()" style="background:#dc3545; width:100%;">🚪 Sair do modo administrador</button>
        </div>
    </div>
</div>

<!-- Badge de admin logado -->
<div id="adminBadge" class="admin-badge">
    👑 Modo Admin Ativo
    <button onclick="logoutAdmin()">Sair</button>
</div>

<script>
// ==================== DADOS DAS JÓIAS ====================
let joias = [];
let ultimoNumeroUsado = 0;
let currentFilter = "disponiveis";
let isAdmin = false;
const ADMIN_PASSWORD = "verdeleve2024";

// ==================== CARREGAR DADOS INICIAIS ====================
function carregarDadosIniciais() {
    const dadosIniciais = [
        { id: 1, numero: "1", categoria: "colar", nome: "Colar marchetaria de Madeira", preco: 50, status: "disponivel", img: "joia1.jpeg" },
        { id: 2, numero: "2", categoria: "colar", nome: "Colar de Madeira", preco: 45, status: "reservado", img: "joia2.jpeg" },
        { id: 3, numero: "3", categoria: "colar", nome: "Colar de Madeira", preco: 45, status: "reservado", img: "joia3.jpeg" },
        { id: 4, numero: "4", categoria: "colar", nome: "Colar de Madeira", preco: 55, status: "disponivel", img: "joia4.jpeg" },
        { id: 5, numero: "5", categoria: "colar", nome: "Colar de Madeira", preco: 50, status: "disponivel", img: "joia5.jpeg" },
        { id: 6, numero: "6", categoria: "colar", nome: "Colar de Madeira", preco: 40, status: "disponivel", img: "joia6.jpeg" },
        { id: 7, numero: "7", categoria: "brinco", nome: "Brinco de Madeira", preco: 50, status: "reservado", img: "joia7.jpeg" },
        { id: 8, numero: "8", categoria: "colar", nome: "Colar de Madeira", preco: 45, status: "disponivel", img: "joia8.jpeg" },
        { id: 9, numero: "10", categoria: "bracelete", nome: "Bracelete de Madeira", preco: 55, status: "reservado", img: "joia10.jpg" },
        { id: 10, numero: "11", categoria: "colar", nome: "Colar de Madeira", preco: 40, status: "disponivel", img: "joia11.jpg" },
        { id: 11, numero: "13", categoria: "colar", nome: "Colar de Madeira", preco: 40, status: "reservado", img: "joia13.jpg" },
        { id: 12, numero: "14", categoria: "colar", nome: "Colar de Madeira", preco: 35, status: "disponivel", img: "joia14.jpg" },
        { id: 13, numero: "15", categoria: "colar", nome: "Colar de Madeira", preco: 50, status: "disponivel", img: "joia15.jpeg" },
        { id: 14, numero: "16", categoria: "brinco", nome: "Brinco de Madeira", preco: 30, status: "disponivel", img: "joia16.jpeg" },
        { id: 15, numero: "17", categoria: "brinco", nome: "Brinco de Madeira", preco: 30, status: "disponivel", img: "joia17.jpeg" }
    ];
    
    joias = dadosIniciais;
    atualizarUltimoNumero();
    salvarNoLocalStorage();
}

function atualizarUltimoNumero() {
    let maxNumero = 0;
    joias.forEach(joia => {
        const num = parseInt(joia.numero);
        if (!isNaN(num) && num > maxNumero) {
            maxNumero = num;
        }
    });
    ultimoNumeroUsado = maxNumero;
}

function salvarNoLocalStorage() {
    localStorage.setItem('verdeleve_joias', JSON.stringify(joias));
    localStorage.setItem('verdeleve_ultimoNumero', ultimoNumeroUsado);
}

function carregarDoLocalStorage() {
    const saved = localStorage.getItem('verdeleve_joias');
    if (saved && saved !== 'undefined') {
        try {
            joias = JSON.parse(saved);
            const savedNum = localStorage.getItem('verdeleve_ultimoNumero');
            ultimoNumeroUsado = savedNum ? parseInt(savedNum) : 0;
        } catch(e) {
            carregarDadosIniciais();
        }
    } else {
        carregarDadosIniciais();
    }
}

// ==================== FUNÇÕES DE ADMIN ====================
function loginAdmin() {
    const password = document.getElementById('adminPassword').value;
    if (password === ADMIN_PASSWORD) {
        isAdmin = true;
        // Esconde login e mostra painel
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        atualizarResumoAdmin();
        fecharModal();
        document.getElementById('adminBadge').style.display = 'flex';
        renderizarJoias();
        alert('✅ Modo administrador ativado!');
    } else {
        alert('❌ Senha incorreta!');
    }
}

function logoutAdmin() {
    isAdmin = false;
    document.getElementById('adminBadge').style.display = 'none';
    // Resetar modal para estado de login
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('adminPassword').value = '';
    // Limpar campos do formulário
    document.getElementById('novaPecaNome').value = '';
    document.getElementById('novaPecaPreco').value = '';
    document.getElementById('novaPecaImg').value = '';
    renderizarJoias();
    alert('👋 Modo administrador desativado.');
}

function abrirModal() {
    if (isAdmin) {
        // Se já está admin, mostra direto o painel
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        atualizarResumoAdmin();
    } else {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('adminPassword').value = '';
    }
    document.getElementById('adminModal').style.display = 'flex';
}

function fecharModal() {
    document.getElementById('adminModal').style.display = 'none';
}

function atualizarResumoAdmin() {
    const total = joias.length;
    const disponiveis = joias.filter(j => j.status !== 'vendido').length;
    const vendidas = joias.filter(j => j.status === 'vendido').length;
    const proximoNum = ultimoNumeroUsado + 1;
    document.getElementById('resumoInfo').innerHTML = `
        📊 <strong>Total de peças:</strong> ${total}<br>
        ✨ <strong>Peças disponíveis:</strong> ${disponiveis}<br>
        💔 <strong>Peças vendidas:</strong> ${vendidas}<br>
        🔢 <strong>Próximo número:</strong> ${proximoNum}
    `;
}

function adicionarNovaPeca() {
    const nome = document.getElementById('novaPecaNome').value.trim();
    const categoria = document.getElementById('novaPecaCategoria').value;
    const preco = parseInt(document.getElementById('novaPecaPreco').value);
    const img = document.getElementById('novaPecaImg').value.trim();
    
    if (!nome) {
        alert('❌ Digite o nome da peça!');
        return;
    }
    if (!preco || preco <= 0) {
        alert('❌ Digite um preço válido!');
        return;
    }
    if (!img) {
        alert('❌ Digite o nome do arquivo da imagem!');
        return;
    }
    
    const proximoNumero = ultimoNumeroUsado + 1;
    const novoId = Date.now();
    
    const novaPeca = {
        id: novoId,
        numero: proximoNumero.toString(),
        categoria: categoria,
        nome: nome,
        preco: preco,
        status: "disponivel",
        img: img
    };
    
    joias.push(novaPeca);
    ultimoNumeroUsado = proximoNumero;
    salvarNoLocalStorage();
    
    // Limpar formulário
    document.getElementById('novaPecaNome').value = '';
    document.getElementById('novaPecaPreco').value = '';
    document.getElementById('novaPecaImg').value = '';
    
    atualizarResumoAdmin();
    renderizarJoias();
    
    alert(`✅ Peça adicionada com sucesso!\n\nNúmero: ${proximoNumero}\nNome: ${nome}\nPreço: R$ ${preco}`);
}

function marcarComoVendida(id) {
    if (!isAdmin) {
        alert('🔒 Acesso restrito. Faça login como administrador.');
        return;
    }
    
    const joia = joias.find(j => j.id === id);
    if (joia && joia.status !== 'vendido') {
        const confirmar = confirm(`✅ Confirmar VENDA da peça Nº ${joia.numero} - ${joia.nome}?`);
        if (confirmar) {
            joia.status = 'vendido';
            salvarNoLocalStorage();
            renderizarJoias();
            atualizarResumoAdmin();
            alert(`✨ Peça Nº ${joia.numero} marcada como VENDIDA!`);
        }
    }
}

function restaurarVenda(id) {
    if (!isAdmin) {
        alert('🔒 Acesso restrito. Faça login como administrador.');
        return;
    }
    
    const joia = joias.find(j => j.id === id);
    if (joia && joia.status === 'vendido') {
        const confirmar = confirm(`♻️ Restaurar peça Nº ${joia.numero} - ${joia.nome}?`);
        if (confirmar) {
            joia.status = 'disponivel';
            salvarNoLocalStorage();
            renderizarJoias();
            atualizarResumoAdmin();
            alert(`🔄 Peça Nº ${joia.numero} restaurada para DISPONÍVEL!`);
        }
    }
}

// ==================== FUNÇÕES DE RENDERIZAÇÃO ====================
function renderizarJoias() {
    const container = document.getElementById('products-container');
    container.innerHTML = '';
    
    let joiasParaMostrar = [];
    
    if (currentFilter === 'disponiveis') {
        joiasParaMostrar = joias.filter(j => j.status !== 'vendido');
    } 
    else if (currentFilter === 'pecas_vendidas') {
        joiasParaMostrar = joias.filter(j => j.status === 'vendido');
    }
    else if (currentFilter === 'brinco') {
        joiasParaMostrar = joias.filter(j => j.categoria === 'brinco' && j.status !== 'vendido');
    }
    else if (currentFilter === 'colar') {
        joiasParaMostrar = joias.filter(j => j.categoria === 'colar' && j.status !== 'vendido');
    }
    else if (currentFilter === 'bracelete') {
        joiasParaMostrar = joias.filter(j => j.categoria === 'bracelete' && j.status !== 'vendido');
    }
    
    joiasParaMostrar.sort((a, b) => parseInt(a.numero) - parseInt(b.numero));
    
    if (joiasParaMostrar.length === 0) {
        let msg = currentFilter === 'pecas_vendidas' ? '💔 Nenhuma peça vendida ainda' : '✨ Nenhuma joia encontrada';
        container.innerHTML = `<div style="text-align: center; padding: 50px; grid-column: 1/-1;">${msg}</div>`;
        return;
    }
    
    joiasParaMostrar.forEach(joia => {
        const card = criarCard(joia);
        container.appendChild(card);
    });
}

function criarCard(joia) {
    const card = document.createElement('div');
    card.className = 'card';
    if (joia.status === 'vendido') {
        card.classList.add('vendido-card');
    }
    card.setAttribute('data-numero', joia.numero);
    card.setAttribute('data-id', joia.id);
    
    let statusText = '';
    let statusClass = '';
    if (joia.status === 'disponivel') {
        statusText = 'Disponível';
        statusClass = 'disponivel';
    } else if (joia.status === 'reservado') {
        statusText = 'Reservado';
        statusClass = 'reservado';
    } else {
        statusText = 'Vendido';
        statusClass = 'vendido';
    }
    
    let adminButtonsHtml = '';
    if (isAdmin) {
        if (joia.status !== 'vendido') {
            adminButtonsHtml = `
                <div class="admin-buttons">
                    <button class="btn-admin btn-vender" onclick="marcarComoVendida(${joia.id})">
                        🔨 Marcar como vendida
                    </button>
                </div>
            `;
        } else {
            adminButtonsHtml = `
                <div class="admin-buttons">
                    <button class="btn-admin btn-restaurar" onclick="restaurarVenda(${joia.id})">
                        ↩️ Restaurar para disponível
                    </button>
                </div>
            `;
        }
    }
    
    card.innerHTML = `
        <img src="${joia.img}" onclick="ampliar(this)" onerror="this.src='https://placehold.co/400x400?text=Imagem+não+encontrada\nNº ${joia.numero}'">
        <div class="overlay">🔍 Clique para ampliar</div>
        <div class="info">
            <span class="status ${statusClass}">${statusText}</span>
            <div class="product-name">${joia.nome}</div>
            <div class="price">R$ ${joia.preco}</div>
            ${joia.status !== 'vendido' ? `<button class="btn-whats" onclick="comprar(this)">💬 Tenho interesse - WhatsApp</button>` : '<div style="font-size:12px; color:#999; margin-top:8px;">🔒 Peça já comercializada</div>'}
            ${adminButtonsHtml}
        </div>
    `;
    
    return card;
}

function filtrar(filtro, event) {
    currentFilter = filtro;
    const botoes = document.querySelectorAll('.tab-btn');
    botoes.forEach(btn => btn.classList.remove('active'));
    if (event && event.target) {
        event.target.classList.add('active');
    }
    renderizarJoias();
}

function ampliar(img) {
    document.getElementById("img-zoom").src = img.src;
    document.getElementById("zoom").style.display = "flex";
}

function fecharZoom() {
    document.getElementById("zoom").style.display = "none";
}

function comprar(botao) {
    const card = botao.closest('.card');
    const numero = card.getAttribute('data-numero');
    const msg = `Olá, tenho interesse na joia número ${numero}`;
    window.open(`https://wa.me/5511963429803?text=${encodeURIComponent(msg)}`);
}

// ==================== INICIALIZAÇÃO ====================
carregarDoLocalStorage();

document.addEventListener('DOMContentLoaded', () => {
    renderizarJoias();
    document.getElementById('adminIcon').addEventListener('click', abrirModal);
    
    window.onclick = function(event) {
        const modal = document.getElementById('adminModal');
        if (event.target === modal) {
            fecharModal();
        }
    };
});
</script>

</body>
</html>
