<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Verdeleve - Admin</title>
<style>
body { font-family: Arial; background: #f6f4f1; margin: 0; }
header { background: #2f3e34; padding: 20px; text-align: center; color: white; }
.admin-btn { position: fixed; bottom: 20px; right: 20px; background: #2f3e34; color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; z-index: 100; }
.admin-panel { display: none; background: white; padding: 20px; margin: 10px; border-radius: 12px; border: 2px solid #2f3e34; }
.admin-panel.show { display: block; }
.products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
.card { background: white; border-radius: 12px; padding: 10px; text-align: center; }
button { cursor: pointer; }
</style>
</head>
<body>

<header><h1>Verdeleve</h1></header>

<div class="products" id="products"></div>

<button class="admin-btn" id="btnAdmin">🔒 Admin</button>

<div class="admin-panel" id="adminPanel">
    <h3>Painel Admin</h3>
    <div id="loginBox">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
    </div>
    <div id="adminBox" style="display:none">
        <p>✅ Modo admin ativado!</p>
        <button onclick="sairAdmin()">Sair</button>
    </div>
</div>

<script>
let admin = false;
const SENHA = "verdeleve2024";

function logar() {
    let s = document.getElementById("senha").value;
    if(s === SENHA) {
        admin = true;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminBox").style.display = "block";
        alert("Admin logado!");
    } else {
        alert("Senha errada!");
    }
}

function sairAdmin() {
    admin = false;
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("adminBox").style.display = "none";
    document.getElementById("senha").value = "";
}

// Botão admin
document.getElementById("btnAdmin").onclick = function() {
    let painel = document.getElementById("adminPanel");
    painel.classList.toggle("show");
};

// Mostrar produtos de exemplo
let produtos = document.getElementById("products");
produtos.innerHTML = '<div class="card">Jóia 1 - R$ 50 <button>WhatsApp</button></div><div class="card">Jóia 2 - R$ 45 <button>WhatsApp</button></div>';
</script>

</body>
</html>
