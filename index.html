<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdeleve</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f1ec;
    color: red;
}

header {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 10px;
    background: #DEB887;
}

.logo {
    width: 320px;
}header {
   header {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 10px; /* mais espaço */
    background: #3b2a22;
}

.logo {
    width: 400px;
}
}

.logo {
    width: 260px;
}

@media (max-width: 500px) {
    .logo {
        width: 180px;
    }
}

/* ABAS */
.tabs {
    display: flex;
    gap: 10px;
    padding: 10px;
    overflow-x: auto;
}

.tabs::-webkit-scrollbar {
    display: none;
}

.tab-btn {
    flex: 1;
    padding: 14px;
    border: none;
    background: #ddd;
    cursor: pointer;
    border-radius: 25px;
    font-size: 14px;
}

@media (max-width: 600px) {
    .tab-btn {
        padding: 8px;
        font-size: 12px;
    }
}

.tab-btn.active {
    background: #3b2a22;
    color: #fff;
}

/* GRID */
.products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

@media (max-width: 600px) {
    .products {
        grid-template-columns: 1fr;
    }
}

/* CARD */
.card {
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    position: relative;
}

/* IMAGEM */
.card img {
    width: 100%;
    height: 35vw;
    max-height: 400px;
    min-height: 180px;
    object-fit: contain;
    padding: 10px;
    cursor: zoom-in;
    transition: transform 0.3s ease;
}

.card:hover img {
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-size: 14px;
    opacity: 0;
    transition: 0.3s;
    pointer-events: none;
}

.card:hover .overlay {
    opacity: 1;
}

/* INFO */
.info {
    padding: 10px;
    text-align: center;
}

.price {
    font-weight: bold;
    color: #7a5c4d;
}

/* BOTÃO */
.btn {
    display: inline-block;
    padding: 6px 12px;
    background: #3b2a22;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    font-size: 13px;
}

.btn-disabled {
    background-color: #a0a0a0;
    pointer-events: none;
}

/* STATUS */
.status {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 8px;
}

.disponivel { background: #d4edda; color: #155724; }
.reservado { background: #fff3cd; color: #856404; }
.vendido { background: #f8d7da; color: #721c24; }

/* ZOOM */
#zoom {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#zoom img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    background: white;
}

/* RODAPÉ */
footer {
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
</header>

<!-- ABAS -->
<div class="tabs">
    <button class="tab-btn active" onclick="filtrar('todos', event)">Todos</button>
    <button class="tab-btn" onclick="filtrar('brinco', event)">Brincos</button>
    <button class="tab-btn" onclick="filtrar('colar', event)">Colares</button>
    <button class="tab-btn" onclick="filtrar('bracelete', event)">Braceletes</button>
</div>

<section class="products">

<div class="card" data-categoria="colar">
    <img src="joia1.jpeg" onclick="ampliar(this)">
    <div class="overlay">Ver imagem</div>
    <div class="info">
        <span class="status disponivel">Disponível</span>
        <div>Colar Natural de Madeira</div>
        <div class="price">R$ 45</div>
        <a class="btn" onclick="comprar('Colar Natural de Madeira')">Comprar</a>
    </div>
</div>

<div class="card" data-categoria="brinco">
    <img src="joia2.jpeg" onclick="ampliar(this)">
    <div class="overlay">Ver imagem</div>
    <div class="info">
        <span class="status reservado">Reservado</span>
        <div>Brinco Madeira</div>
        <div class="price">R$ 45</div>
        <a class="btn">Ver disponibilidade</a>
    </div>
</div>

<div class="card" data-categoria="bracelete">
    <img src="joia3.jpeg" onclick="ampliar(this)">
    <div class="overlay">Ver imagem</div>
    <div class="info">
        <span class="status vendido">Vendido</span>
        <div>Pulseira Rústica</div>
        <div class="price">R$ 55</div>
        <a class="btn btn-disabled">Indisponível</a>
    </div>
</div>

<!-- DUPLICA OS CARDS ABAIXO CONFORME PRECISAR -->

</section>

<footer>
📲 WhatsApp: (11) 96342-9803
</footer>

<!-- ZOOM -->
<div id="zoom" onclick="fecharZoom()">
    <img id="img-zoom">
</div>

<!-- SCRIPT -->
<script>
function filtrar(categoria, event) {
    const cards = document.querySelectorAll('.card');
    const botoes = document.querySelectorAll('.tab-btn');

    botoes.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    cards.forEach(card => {
        card.style.display =
            (categoria === 'todos' || card.dataset.categoria === categoria)
            ? 'block' : 'none';
    });
}

function ampliar(img) {
    document.getElementById("img-zoom").src = img.src;
    document.getElementById("zoom").style.display = "flex";
}

function fecharZoom() {
    document.getElementById("zoom").style.display = "none";
}

function comprar(nome) {
    const msg = `Olá, tenho interesse no ${nome}`;
    window.open(`https://wa.me/5511963429803?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
